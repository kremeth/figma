<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutricode — Feature list</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@500&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e8ea;
      font-family: "Urbanist", system-ui, sans-serif;
    }
    .card {
      width: 380px;
      min-height: 206px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
      padding: 26px 24px 21px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 39px;
    }
    .icon-wrap {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-wrap img {
      width: 16px;
      height: 16px;
      object-fit: contain;
      display: block;
    }
    .icon-wrap img.sm {
      width: 15.36px;
      height: 15.36px;
    }
    .label {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
      line-height: 21.7px;
      color: #1d1d1d;
      margin: 0;
    }
    .status {
      flex-shrink: 0;
      font-family: Menlo, "SF Mono", ui-monospace, monospace;
      font-size: 14px;
      line-height: 21.7px;
      color: #98989d;
      font-style: normal;
    }
  </style>
</head>
<body>
  <article class="card" aria-label="Included features">
    <div class="row">
      <div class="icon-wrap" aria-hidden="true">
        <img class="sm" src="https://www.figma.com/api/mcp/asset/2803ef8c-6f02-4479-977e-cdb02b82be7e" alt="" />
      </div>
      <p class="label">Monthly metric analysis</p>
      <span class="status">Included</span>
    </div>
    <div class="row">
      <div class="icon-wrap" aria-hidden="true">
        <img src="https://www.figma.com/api/mcp/asset/66a586d4-cc38-47e7-b23f-f08f574062e6" alt="" />
      </div>
      <p class="label">Monthly stack adjustments</p>
      <span class="status">Included</span>
    </div>
    <div class="row">
      <div class="icon-wrap" aria-hidden="true">
        <img class="sm" src="https://www.figma.com/api/mcp/asset/f389b4fa-f344-4195-b32f-a09402b9fb4e" alt="" />
      </div>
      <p class="label">Research-grade doses</p>
      <span class="status">Included</span>
    </div>
    <div class="row">
      <div class="icon-wrap" aria-hidden="true">
        <img src="https://www.figma.com/api/mcp/asset/d19cc9c0-d893-40a9-a59c-c067e8d9c2df" alt="" />
      </div>
      <p class="label">Latest compounds and research</p>
      <span class="status">Included</span>
    </div>
  </article>
</body>
</html>
